name: CI

# Deterministic quality gates on every PR and push to the default branch.
# Agent-opened PRs pass through exactly these checks - an agent's own claim of
# "tests pass" never substitutes for this workflow. The release workflow
# requires this to be green before it will publish.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (orchestrate extra only on Python >= 3.10)
        # cursor-sdk (the orchestrate extra) requires Python >= 3.10, but the
        # core library supports 3.9. On 3.9 we install just the dev extra and
        # let the orchestrate-only tests skip via importorskip.
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.python-version }}" = "3.9" ]; then
            pip install -e ".[dev]"
          else
            pip install -e ".[dev,orchestrate]"
          fi

      - name: Run tests
        run: pytest -q

      - name: Eval regression gate
        run: python eval/check_baseline.py

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Clean-room wheel smoke test
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/python -c "import corticore; print('import OK', corticore.__version__)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14
